on:
  schedule:
    - cron: "0 0 * * *"

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  stale:
    permissions:
      issues: write
      pull-requests: write
      contents: read
      actions: read
    uses: omec-project/.github/.github/workflows/stale-issue.yml@83e008dce269e94fbd6cdbb79847283f0b9e9774 # v0.0.19
    with:
      days_before_stale: 120
      days_before_close: 15
    secrets: inherit
